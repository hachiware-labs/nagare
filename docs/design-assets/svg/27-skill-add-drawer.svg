<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="960" viewBox="0 0 1440 960">
  <rect width="1440" height="960" fill="#f8fafc"/>
  <style>
    .title{font:700 24px Inter,Segoe UI,"Yu Gothic UI",Meiryo,Arial,sans-serif;fill:#020617}
    .h2{font:700 17px Inter,Segoe UI,"Yu Gothic UI",Meiryo,Arial,sans-serif;fill:#020617}
    .h3{font:700 14px Inter,Segoe UI,"Yu Gothic UI",Meiryo,Arial,sans-serif;fill:#020617}
    .body{font:500 13px Inter,Segoe UI,"Yu Gothic UI",Meiryo,Arial,sans-serif;fill:#020617}
    .small{font:500 11px Inter,Segoe UI,"Yu Gothic UI",Meiryo,Arial,sans-serif;fill:#334155}
    .tiny{font:600 10px Inter,Segoe UI,"Yu Gothic UI",Meiryo,Arial,sans-serif;fill:#334155}
    .nav{font:650 13px Inter,Segoe UI,Arial,sans-serif;fill:#334155}
    .nav-on{font:700 13px Inter,Segoe UI,Arial,sans-serif;fill:#4338ca}
  </style>

  <rect x="0" y="0" width="200" height="960" fill="#ffffff" stroke="#e2e8f0"/>
  <text x="28" y="42" class="title">Nagare</text>
  <text x="30" y="64" class="tiny" style="fill:#4338ca">HACHIWARE LABS</text>
  <text x="34" y="118" class="nav">Work Items</text>
  <rect x="18" y="134" width="164" height="32" rx="7" fill="#eef2ff" stroke="#eef2ff"/>
  <text x="34" y="156" class="nav-on">Skills</text>
  <text x="34" y="194" class="nav">MCP</text>
  <text x="34" y="232" class="nav">Agents</text>
  <line x1="200" y1="0" x2="200" y2="960" stroke="#e2e8f0"/>

  <text x="232" y="48" class="title">Skills</text>
  <text x="232" y="72" class="small">Skill カタログへ追加</text>
  <rect x="232" y="96" width="760" height="772" rx="8" fill="#ffffff" stroke="#e2e8f0"/>
  <text x="260" y="134" class="h2">Skill カタログ</text>
  <rect x="260" y="170" width="704" height="74" rx="8" fill="#ffffff" stroke="#e2e8f0"/>
  <text x="280" y="198" class="h3">hachiware-labs/hachi-search</text>
  <text x="280" y="220" class="small">使用中Agent: researcher ↗</text>
  <rect x="260" y="262" width="704" height="74" rx="8" fill="#ffffff" stroke="#e2e8f0"/>
  <text x="280" y="290" class="h3">domain-review-checks</text>
  <text x="280" y="312" class="small">使用中Agent: reviewer ↗</text>

  <rect x="1028" y="0" width="412" height="960" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="1058" y="48" class="title">Skillを追加</text>
  <text x="1058" y="72" class="small">追加元だけ指定すれば、metadata は自動で読む</text>

  <text x="1058" y="120" class="tiny">追加元</text>
  <rect x="1058" y="138" width="330" height="42" rx="7" fill="#f8fafc" stroke="#cbd5e1"/>
  <text x="1076" y="165" class="body">GitHub URL</text>
  <text x="1058" y="214" class="tiny">URL / folder</text>
  <rect x="1058" y="232" width="330" height="42" rx="7" fill="#f8fafc" stroke="#cbd5e1"/>
  <text x="1076" y="259" class="body">github.com/hachiware-labs/hachi-search</text>

  <text x="1058" y="310" class="tiny">読み取り結果</text>
  <rect x="1058" y="328" width="330" height="154" rx="8" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="1076" y="360" class="h3">hachi-search</text>
  <text x="1076" y="388" class="small">Local/wiki/web federated search</text>
  <text x="1076" y="418" class="small">version: commit 8f42c1a</text>
  <text x="1076" y="448" class="small">checksum: pending</text>
  <text x="1076" y="472" class="small">requires: web access optional</text>

  <text x="1058" y="530" class="tiny">用途</text>
  <rect x="1058" y="548" width="82" height="26" rx="13" fill="#eef2ff" stroke="#eef2ff"/>
  <text x="1074" y="566" class="tiny" style="fill:#4338ca">調査</text>
  <rect x="1148" y="548" width="82" height="26" rx="13" fill="#f1f5f9" stroke="#f1f5f9"/>
  <text x="1164" y="566" class="tiny" style="fill:#475569">確認</text>
  <rect x="1238" y="548" width="82" height="26" rx="13" fill="#f1f5f9" stroke="#f1f5f9"/>
  <text x="1254" y="566" class="tiny" style="fill:#475569">レビュー</text>

  <text x="1058" y="626" class="tiny">Agentへの割り当て</text>
  <rect x="1058" y="644" width="330" height="74" rx="8" fill="#fffbeb" stroke="#fde68a"/>
  <text x="1076" y="674" class="small">追加後、Agent詳細の Skills / MCP で設定する。</text>
  <text x="1076" y="700" class="small">この画面では全Agentへ公開しない。</text>

  <rect x="1058" y="778" width="142" height="34" rx="7" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="1072" y="800" class="body">キャンセル</text>
  <rect x="1214" y="778" width="142" height="34" rx="7" fill="#4338ca" stroke="#4338ca"/>
  <text x="1232" y="800" class="body" style="fill:#ffffff">Skillを追加</text>
</svg>
