<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="1024" viewBox="0 0 1440 1024" role="img" aria-labelledby="-title -desc">
  <title id="-title">ドメイン</title>
  <desc id="-desc">ドメインに応じた成果物種別選択、選択成果物種別の品質基準、利用中エージェントと品質記録を確認する画面。</desc>
  <rect width="1440" height="1024" fill="#f7f8fb"/>
  <style>
    .title{font:700 25px Inter,"Segoe UI","Yu Gothic UI",Meiryo,Arial,sans-serif;fill:#111827}
    .kicker{font:700 10px Inter,"Segoe UI",Arial,sans-serif;fill:#4f46e5}
    .h1{font:750 22px Inter,"Segoe UI","Yu Gothic UI",Meiryo,Arial,sans-serif;fill:#111827}
    .h2{font:700 16px Inter,"Segoe UI","Yu Gothic UI",Meiryo,Arial,sans-serif;fill:#111827}
    .h3{font:700 13px Inter,"Segoe UI","Yu Gothic UI",Meiryo,Arial,sans-serif;fill:#111827}
    .body{font:500 12px Inter,"Segoe UI","Yu Gothic UI",Meiryo,Arial,sans-serif;fill:#111827}
    .small{font:500 11px Inter,"Segoe UI","Yu Gothic UI",Meiryo,Arial,sans-serif;fill:#526174}
    .tiny{font:700 10px Inter,"Segoe UI","Yu Gothic UI",Meiryo,Arial,sans-serif;fill:#526174}
    .mono{font:500 11px Consolas,Menlo,monospace;fill:#111827}
    .nav{font:650 13px Inter,"Segoe UI",Arial,sans-serif;fill:#526174}
    .nav-on{font:750 13px Inter,"Segoe UI",Arial,sans-serif;fill:#4f46e5}
  </style>

    <g id="sidebar">
      <rect x="0" y="0" width="204" height="1024" rx="0" fill="#ffffff" stroke="#d8e0ea" stroke-width="1"/>
      <text x="28" y="43" class="title">Nagare</text>
      <text x="30" y="64" class="kicker">制御プレーン</text>
      <text x="30" y="82" class="small">プロジェクト対応ランタイム</text>
      <g>

        <text x="34" y="118" class="nav">ワーク</text>
      </g><g>

        <text x="34" y="157" class="nav">プロジェクト</text>
      </g><g>
        <rect x="18" y="174" width="168" height="33" rx="7" fill="#eef2ff" stroke="#eef2ff" stroke-width="1"/>
        <text x="34" y="196" class="nav-on">ドメイン</text>
      </g><g>

        <text x="34" y="235" class="nav">エージェント</text>
      </g><g>

        <text x="34" y="274" class="nav">スキル</text>
      </g><g>

        <text x="34" y="313" class="nav">MCP</text>
      </g><g>

        <text x="34" y="352" class="nav">設定</text>
      </g>
    </g>
    <g id="page-header">
      <text x="232" y="48" class="title">ドメイン</text>
      <text x="232" y="72" class="small">ドメインと成果物種別ごとに品質基準を管理する</text>

    </g>
    <g id="content">

    <rect x="232" y="96" width="1164" height="828" rx="8" fill="#ffffff" stroke="#d8e0ea" stroke-width="1"/>
    <rect x="252" y="124" width="1124" height="96" rx="8" fill="#fbfcfe" stroke="#d8e0ea" stroke-width="1"/>
    <text x="276" y="162" class="h1">ドメイン品質設定</text>
    <text x="276" y="190" class="body">ドメインごとの共通基準と、成果物種別ごとのレビュー観点を管理します。</text>
    <rect x="1154" y="154" width="124" height="34" rx="7" fill="#4f46e5" stroke="#4f46e5" stroke-width="1"/>
  <text x="1168" y="176" class="body" style="fill:#ffffff">ドメインを追加</text>
    <rect x="1286" y="154" width="68" height="34" rx="7" fill="#ffffff" stroke="#b8c4d3" stroke-width="1"/>
  <text x="1300" y="176" class="body" style="fill:#111827">複製</text>

    <rect x="252" y="248" width="366" height="596" rx="8" fill="#fbfcfe" stroke="#d8e0ea" stroke-width="1"/>
    <text x="276" y="288" class="h1">ドメイン選択</text>
    <text x="276" y="320" class="h3">ドメイン</text>
    <rect x="276" y="334" width="294" height="38" rx="7" fill="#ffffff" stroke="#b8c4d3" stroke-width="1"/>
    <text x="290" y="359" class="body">開発</text>
    <path d="M 542 349 L 550 357 L 558 349" fill="none" stroke="#526174" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="276" y="402" class="h2">このドメインの成果物種別</text>
    <g>
      <rect x="276" y="426" width="318" height="72" rx="7" fill="#eef2ff" stroke="#eef2ff" stroke-width="1"/>
      <rect x="276" y="426" width="4" height="72" rx="2" fill="#4f46e5"/>
      <text x="300" y="454" class="h3" style="fill:#4f46e5">コード変更</text>
      <text x="300" y="478" class="small">実装、テスト追加、修正作業</text>
      <rect x="492" y="446" width="78" height="24" rx="12" fill="#eef2ff" stroke="#eef2ff" stroke-width="1"/>
  <text x="502" y="462" class="tiny" style="fill:#4f46e5">使用中</text>
    </g>
    <g>
      <rect x="276" y="510" width="318" height="72" rx="7" fill="#ffffff" stroke="#d8e0ea" stroke-width="1"/>
      <rect x="276" y="510" width="4" height="72" rx="2" fill="#2563eb"/>
      <text x="300" y="538" class="h3">レビュー結果</text>
      <text x="300" y="562" class="small">差分確認、品質評価、採用判断</text>
      <rect x="492" y="530" width="78" height="24" rx="12" fill="#f1f5f9" stroke="#f1f5f9" stroke-width="1"/>
  <text x="502" y="546" class="tiny" style="fill:#526174">使用中</text>
    </g>
    <g>
      <rect x="276" y="594" width="318" height="72" rx="7" fill="#ffffff" stroke="#d8e0ea" stroke-width="1"/>
      <rect x="276" y="594" width="4" height="72" rx="2" fill="#2563eb"/>
      <text x="300" y="622" class="h3">テスト結果</text>
      <text x="300" y="646" class="small">再現、検証、失敗原因の切り分け</text>
      <rect x="492" y="614" width="78" height="24" rx="12" fill="#f1f5f9" stroke="#f1f5f9" stroke-width="1"/>
  <text x="502" y="630" class="tiny" style="fill:#526174">準備中</text>
    </g>
    <g>
      <rect x="276" y="678" width="318" height="72" rx="7" fill="#ffffff" stroke="#d8e0ea" stroke-width="1"/>
      <rect x="276" y="678" width="4" height="72" rx="2" fill="#2563eb"/>
      <text x="300" y="706" class="h3">ドキュメント</text>
      <text x="300" y="730" class="small">README、仕様、手順の更新</text>
      <rect x="492" y="698" width="78" height="24" rx="12" fill="#f1f5f9" stroke="#f1f5f9" stroke-width="1"/>
  <text x="502" y="714" class="tiny" style="fill:#526174">使用中</text>
    </g>
    <text x="276" y="790" class="small" style="fill:#526174">別ドメインの成果物種別はここには表示しません。</text>

    <rect x="636" y="248" width="456" height="596" rx="8" fill="#fbfcfe" stroke="#d8e0ea" stroke-width="1"/>
    <text x="660" y="288" class="h1">コード変更</text>
    <text x="660" y="316" class="body">AIに渡す品質基準とレビュー観点</text>
    <rect x="946" y="278" width="72" height="34" rx="7" fill="#ffffff" stroke="#b8c4d3" stroke-width="1"/>
  <text x="960" y="300" class="body" style="fill:#111827">編集</text>
    <rect x="660" y="340" width="196" height="24" rx="12" fill="#dbeafe" stroke="#dbeafe" stroke-width="1"/>
  <text x="670" y="356" class="tiny" style="fill:#2563eb">適用: プロジェクト nagare</text>
    <rect x="872" y="340" width="146" height="24" rx="12" fill="#f1f5f9" stroke="#f1f5f9" stroke-width="1"/>
  <text x="882" y="356" class="tiny" style="fill:#526174">最終更新: 6分前</text>
    <text x="660" y="404" class="h2">必ず守る前提</text>
    <text x="660" y="430" class="body">既存構成とテスト方針を尊重し、不要な大規模リファクタを避ける。</text>
    <text x="660" y="466" class="h2">禁止事項</text>
    <text x="660" y="492" class="body">未確認の破壊的操作、認証情報の露出、実装範囲外の設計変更。</text>
    <text x="660" y="548" class="h2">レビュー観点</text>
    <g>
      <rect x="636" y="572" width="430" height="74" rx="7" fill="#ffffff" stroke="#d8e0ea" stroke-width="1"/>
      <text x="658" y="600" class="h3">目的整合性</text>
      <text x="658" y="624" class="small">依頼の目的と変更内容が一致している</text>
      <rect x="962" y="594" width="84" height="24" rx="12" fill="#dcfce7" stroke="#dcfce7" stroke-width="1"/>
  <text x="972" y="610" class="tiny" style="fill:#15803d">必須</text>
    </g>
    <g>
      <rect x="636" y="656" width="430" height="74" rx="7" fill="#ffffff" stroke="#d8e0ea" stroke-width="1"/>
      <text x="658" y="684" class="h3">既存パターン尊重</text>
      <text x="658" y="708" class="small">周辺コードの設計とUI規則に沿っている</text>
      <rect x="962" y="678" width="84" height="24" rx="12" fill="#dcfce7" stroke="#dcfce7" stroke-width="1"/>
  <text x="972" y="694" class="tiny" style="fill:#15803d">必須</text>
    </g>
    <g>
      <rect x="636" y="740" width="430" height="74" rx="7" fill="#ffffff" stroke="#d8e0ea" stroke-width="1"/>
      <text x="658" y="768" class="h3">確認可能性</text>
      <text x="658" y="792" class="small">テストまたは目視で確認できる</text>
      <rect x="962" y="762" width="84" height="24" rx="12" fill="#fef3c7" stroke="#fef3c7" stroke-width="1"/>
  <text x="972" y="778" class="tiny" style="fill:#b45309">推奨</text>
    </g>

    <rect x="1112" y="248" width="244" height="596" rx="8" fill="#fbfcfe" stroke="#d8e0ea" stroke-width="1"/>
    <text x="1132" y="288" class="h2">利用状況</text>
    <text x="1132" y="316" class="small">この成果物種別を使うエージェント</text>
    <rect x="1132" y="344" width="254" height="58" rx="7" fill="#ffffff" stroke="#d8e0ea" stroke-width="1"/>
    <text x="1148" y="368" class="h3">create-agent</text>
    <rect x="1282" y="360" width="82" height="24" rx="12" fill="#dcfce7" stroke="#dcfce7" stroke-width="1"/>
  <text x="1292" y="376" class="tiny" style="fill:#15803d">作業</text>
    <text x="1148" y="388" class="small">この成果物種別の依頼で候補に入る</text>
    <rect x="1132" y="416" width="254" height="58" rx="7" fill="#ffffff" stroke="#d8e0ea" stroke-width="1"/>
    <text x="1148" y="440" class="h3">review-agent</text>
    <rect x="1282" y="432" width="82" height="24" rx="12" fill="#dbeafe" stroke="#dbeafe" stroke-width="1"/>
  <text x="1292" y="448" class="tiny" style="fill:#2563eb">レビュー</text>
    <text x="1148" y="460" class="small">この成果物種別の依頼で候補に入る</text>
    <text x="1132" y="522" class="h2">最近の品質記録</text>
    <rect x="1132" y="548" width="104" height="24" rx="12" fill="#dcfce7" stroke="#dcfce7" stroke-width="1"/>
  <text x="1142" y="564" class="tiny" style="fill:#15803d">採用率 82%</text>
    <rect x="1132" y="584" width="120" height="24" rx="12" fill="#fef3c7" stroke="#fef3c7" stroke-width="1"/>
  <text x="1142" y="600" class="tiny" style="fill:#b45309">差し戻し 3件</text>
    <text x="1132" y="650" class="h2">見直し候補</text>
    <text x="1132" y="678" class="small">レビュー観点「確認可能性」の</text>
    <text x="1132" y="700" class="small">記述を具体化する候補あり。</text>
    <rect x="1132" y="738" width="142" height="34" rx="7" fill="#ffffff" stroke="#b8c4d3" stroke-width="1"/>
  <text x="1146" y="760" class="body" style="fill:#111827">改善候補を見る</text>

    </g>

</svg>