      <text x="1130" y="580" class="small">エージェントで設定</text>
      <rect x="1230" y="570" width="72" height="34" rx="7" fill="#ffffff" stroke="#b8c4d3" stroke-width="1"/>
  <text x="1244" y="592" class="body" style="fill:#111827">詳細</text>
