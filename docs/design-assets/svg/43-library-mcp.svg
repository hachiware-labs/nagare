    <text x="276" y="416" class="h3">接続方式</text>
    <rect x="276" y="430" width="180" height="38" rx="7" fill="#ffffff" stroke="#b8c4d3" stroke-width="1"/>
    <text x="290" y="455" class="body">すべて</text>
    <path d="M 428 445 L 436 453 L 444 445" fill="none" stroke="#526174" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="478" y="416" class="h3">認証</text>
    <rect x="478" y="430" width="180" height="38" rx="7" fill="#ffffff" stroke="#b8c4d3" stroke-width="1"/>
    <text x="492" y="455" class="body">すべて</text>
    <path d="M 630 445 L 638 453 L 646 445" fill="none" stroke="#526174" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="680" y="416" class="h3">対応ランタイム</text>
    <rect x="680" y="430" width="180" height="38" rx="7" fill="#ffffff" stroke="#b8c4d3" stroke-width="1"/>
    <text x="694" y="455" class="body">すべて</text>
    <path d="M 832 445 L 840 453 L 848 445" fill="none" stroke="#526174" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="882" y="430" width="200" height="38" rx="7" fill="#ffffff" stroke="#b8c4d3" stroke-width="1"/>
    <text x="900" y="455" class="small" style="fill:#526174">名前で検索</text>
    <rect x="1102" y="430" width="92" height="34" rx="7" fill="#ffffff" stroke="#b8c4d3" stroke-width="1"/>
  <text x="1116" y="452" class="body" style="fill:#111827">絞り込み</text>
    <rect x="1206" y="430" width="78" height="34" rx="7" fill="#ffffff" stroke="#b8c4d3" stroke-width="1"/>
