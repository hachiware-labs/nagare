    <g>
      <rect x="276" y="626" width="1056" height="86" rx="0" fill="#ffffff" stroke="#d8e0ea" stroke-width="1"/>
      <rect x="276" y="626" width="4" height="86" rx="2" fill="#7c3aed"/>
