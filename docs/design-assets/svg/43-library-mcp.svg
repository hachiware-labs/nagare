      <text x="562" y="662" class="body">stdio</text>
      <text x="654" y="662" class="body">なし</text>
      <text x="770" y="656" class="small">Codex/Claude/OpenCode: プロジェクト限定</text>
      <rect x="1016" y="649" width="92" height="24" rx="12" fill="#fef3c7" stroke="#fef3c7" stroke-width="1"/>
