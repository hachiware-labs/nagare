<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="1024" viewBox="0 0 1440 1024" role="img" aria-labelledby="mcp-title mcp-desc">
  <title id="mcp-title">エージェントMCP設定</title>
  <desc id="mcp-desc">エージェントのランタイム能力に応じて、選択可能なMCPだけを表示し、割り当て済みMCPを確認する画面。</desc>
  <rect width="1440" height="1024" fill="#f7f8fb"/>
  <style>
    .title{font:700 25px Inter,"Segoe UI","Yu Gothic UI",Meiryo,Arial,sans-serif;fill:#111827}
    .kicker{font:700 10px Inter,"Segoe UI",Arial,sans-serif;fill:#4f46e5}
    .h1{font:750 22px Inter,"Segoe UI","Yu Gothic UI",Meiryo,Arial,sans-serif;fill:#111827}
    .h2{font:700 16px Inter,"Segoe UI","Yu Gothic UI",Meiryo,Arial,sans-serif;fill:#111827}
    .h3{font:700 13px Inter,"Segoe UI","Yu Gothic UI",Meiryo,Arial,sans-serif;fill:#111827}
    .body{font:500 12px Inter,"Segoe UI","Yu Gothic UI",Meiryo,Arial,sans-serif;fill:#111827}
    .small{font:500 11px Inter,"Segoe UI","Yu Gothic UI",Meiryo,Arial,sans-serif;fill:#526174}
    .tiny{font:700 10px Inter,"Segoe UI","Yu Gothic UI",Meiryo,Arial,sans-serif;fill:#526174}
    .mono{font:500 11px Consolas,Menlo,monospace;fill:#111827}
    .nav{font:650 13px Inter,"Segoe UI",Arial,sans-serif;fill:#526174}
    .nav-on{font:750 13px Inter,"Segoe UI",Arial,sans-serif;fill:#4f46e5}
  </style>

    <g id="sidebar">
      <rect x="0" y="0" width="204" height="1024" rx="0" fill="#ffffff" stroke="#d8e0ea" stroke-width="1"/>
      <text x="28" y="43" class="title">Nagare</text>
      <text x="30" y="64" class="kicker">制御プレーン</text>
      <text x="30" y="82" class="small">プロジェクト対応ランタイム</text>
      <g>

        <text x="34" y="118" class="nav">ワーク</text>
      </g><g>

        <text x="34" y="157" class="nav">プロジェクト</text>
      </g><g>

        <text x="34" y="196" class="nav">ドメイン</text>
      </g><g>
        <rect x="18" y="213" width="168" height="33" rx="7" fill="#eef2ff" stroke="#eef2ff" stroke-width="1"/>
        <text x="34" y="235" class="nav-on">エージェント</text>
      </g><g>

        <text x="34" y="274" class="nav">スキル</text>
      </g><g>

        <text x="34" y="313" class="nav">MCP</text>
      </g><g>

        <text x="34" y="352" class="nav">設定</text>
      </g>
    </g>
    <g id="page-header">
      <text x="232" y="48" class="title">エージェントMCP設定</text>
      <text x="232" y="72" class="small">エージェントのランタイムで安全に扱えるMCPだけを付与する</text>

    </g>
    <g id="content">

    <rect x="232" y="96" width="1164" height="828" rx="8" fill="#ffffff" stroke="#d8e0ea" stroke-width="1"/>
    <rect x="252" y="124" width="1124" height="118" rx="8" fill="#fbfcfe" stroke="#d8e0ea" stroke-width="1"/>
    <text x="276" y="162" class="h1">review-agent</text>
    <text x="276" y="190" class="body">レビュー担当のエージェントに、ランタイムが安全に扱えるMCPだけを付与します。</text>
    <rect x="276" y="208" width="166" height="24" rx="12" fill="#eef2ff" stroke="#eef2ff" stroke-width="1"/>
  <text x="286" y="224" class="tiny" style="fill:#4f46e5">ランタイム: Codex CLI</text>
    <rect x="456" y="208" width="174" height="24" rx="12" fill="#dcfce7" stroke="#dcfce7" stroke-width="1"/>
  <text x="466" y="224" class="tiny" style="fill:#15803d">MCP範囲: プロジェクト</text>
    <rect x="644" y="208" width="154" height="24" rx="12" fill="#f1f5f9" stroke="#f1f5f9" stroke-width="1"/>
  <text x="654" y="224" class="tiny" style="fill:#526174">プロジェクト: nagare</text>
    <rect x="1166" y="166" width="80" height="34" rx="7" fill="#4f46e5" stroke="#4f46e5" stroke-width="1"/>
  <text x="1180" y="188" class="body" style="fill:#ffffff">保存</text>
    <rect x="1258" y="166" width="96" height="34" rx="7" fill="#ffffff" stroke="#b8c4d3" stroke-width="1"/>
  <text x="1272" y="188" class="body" style="fill:#111827">キャンセル</text>

    <rect x="252" y="270" width="1124" height="74" rx="8" fill="#fbfcfe" stroke="#d8e0ea" stroke-width="1"/>
    <text x="276" y="300" class="h2">選択候補の条件</text>
    <text x="276" y="326" class="body">Codex CLIは固定テーブル上でプロジェクト単位の付与が可能なため、該当するMCPだけ表示します。</text>
    <text x="1030" y="326" class="small" style="fill:#526174">候補外: グローバルのみ / 未接続</text>

    <rect x="252" y="372" width="768" height="472" rx="8" fill="#fbfcfe" stroke="#d8e0ea" stroke-width="1"/>
    <text x="276" y="412" class="h1">このエージェントで選べるMCP</text>
    <rect x="276" y="436" width="326" height="38" rx="7" fill="#ffffff" stroke="#b8c4d3" stroke-width="1"/>
    <text x="294" y="461" class="small" style="fill:#526174">名前で検索</text>
    <rect x="620" y="436" width="132" height="34" rx="7" fill="#ffffff" stroke="#b8c4d3" stroke-width="1"/>
  <text x="634" y="458" class="body" style="fill:#111827">権限で絞り込み</text>
    <rect x="762" y="436" width="78" height="34" rx="7" fill="#ffffff" stroke="#b8c4d3" stroke-width="1"/>
  <text x="776" y="458" class="body" style="fill:#111827">クリア</text>
    <g>
      <rect x="276" y="502" width="720" height="96" rx="7" fill="#ffffff" stroke="#d8e0ea" stroke-width="1"/>
      <rect x="276" y="502" width="4" height="96" rx="2" fill="#7c3aed"/>
      <text x="300" y="530" class="h3">github-mcp</text>
      <text x="300" y="554" class="small">Issue、PR、Actionsを参照・操作する</text>
      <text x="300" y="578" class="small" style="fill:#526174">Codex CLI: .codex/config.tomlへproject限定で反映</text>
      <rect x="748" y="520" width="120" height="24" rx="12" fill="#dcfce7" stroke="#dcfce7" stroke-width="1"/>
  <text x="758" y="536" class="tiny" style="fill:#15803d">参照 + 操作</text>
      <rect x="878" y="558" width="82" height="34" rx="7" fill="#4f46e5" stroke="#4f46e5" stroke-width="1"/>
  <text x="892" y="580" class="body" style="fill:#ffffff">追加</text>
    </g>
    <g>
      <rect x="276" y="614" width="720" height="96" rx="7" fill="#ffffff" stroke="#d8e0ea" stroke-width="1"/>
      <rect x="276" y="614" width="4" height="96" rx="2" fill="#7c3aed"/>
      <text x="300" y="642" class="h3">filesystem-mcp</text>
      <text x="300" y="666" class="small">許可された作業フォルダを読み書きする</text>
      <text x="300" y="690" class="small" style="fill:#526174">Codex CLI: 実行フォルダ内に限定して反映</text>
      <rect x="748" y="632" width="120" height="24" rx="12" fill="#fef3c7" stroke="#fef3c7" stroke-width="1"/>
  <text x="758" y="648" class="tiny" style="fill:#b45309">読取 + 書込</text>
      <rect x="878" y="670" width="82" height="34" rx="7" fill="#4f46e5" stroke="#4f46e5" stroke-width="1"/>
  <text x="892" y="692" class="body" style="fill:#ffffff">追加</text>
    </g>

    <rect x="1030" y="372" width="326" height="472" rx="8" fill="#fbfcfe" stroke="#d8e0ea" stroke-width="1"/>
    <text x="1050" y="412" class="h2">割り当て済みMCP</text>
    <text x="1050" y="438" class="small">実行時にこのエージェントだけへ渡します。</text>
    <g>
      <rect x="1030" y="474" width="302" height="84" rx="7" fill="#ffffff" stroke="#d8e0ea" stroke-width="1"/>
      <text x="1050" y="502" class="h3">github-mcp</text>
      <text x="1050" y="524" class="small">レビュー時にPRとIssueを確認</text>
      <rect x="1050" y="532" width="122" height="24" rx="12" fill="#dcfce7" stroke="#dcfce7" stroke-width="1"/>
  <text x="1060" y="548" class="tiny" style="fill:#15803d">参照 + 操作</text>
      <rect x="1238" y="499" width="70" height="34" rx="7" fill="#ffffff" stroke="#b8c4d3" stroke-width="1"/>
  <text x="1252" y="521" class="body" style="fill:#111827">外す</text>
    </g>
    <rect x="1050" y="586" width="262" height="112" rx="8" fill="#f1f5f9" stroke="#d8e0ea" stroke-width="1"/>
    <text x="1070" y="618" class="h3">候補に出さないもの</text>
    <text x="1070" y="646" class="small">figma-mcp: 未接続</text>
    <text x="1070" y="672" class="small">グローバルのみMCP: エージェント単位で制御不可</text>
    <text x="1070" y="740" class="small" style="fill:#526174">詳細な除外理由はMCP管理で確認</text>

    </g>

</svg>