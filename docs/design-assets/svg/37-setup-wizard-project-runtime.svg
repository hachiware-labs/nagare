    <g id="page-header">
      <text x="232" y="48" class="title">ワーク</text>
      <text x="232" y="72" class="small">セットアップ中です。まずプロジェクトを選択または作成します</text>

    </g>
    <g id="content">

    <rect x="232" y="96" width="1164" height="828" rx="8" fill="#ffffff" stroke="#d8e0ea" stroke-width="1"/>
