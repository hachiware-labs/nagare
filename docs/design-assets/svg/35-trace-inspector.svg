<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="1024" viewBox="0 0 1440 1024" role="img" aria-labelledby="-title -desc">
  <title id="-title">トレース詳細</title>
  <desc id="-desc">ステップ履歴、エージェント選定理由、根拠、現在の判断を示すトレース詳細画面。</desc>
  <rect width="1440" height="1024" fill="#f7f8fb"/>
  <style>
    .title{font:700 25px Inter,"Segoe UI","Yu Gothic UI",Meiryo,Arial,sans-serif;fill:#111827}
    .kicker{font:700 10px Inter,"Segoe UI",Arial,sans-serif;fill:#4f46e5}
    .h1{font:750 22px Inter,"Segoe UI","Yu Gothic UI",Meiryo,Arial,sans-serif;fill:#111827}
    .h2{font:700 16px Inter,"Segoe UI","Yu Gothic UI",Meiryo,Arial,sans-serif;fill:#111827}
    .h3{font:700 13px Inter,"Segoe UI","Yu Gothic UI",Meiryo,Arial,sans-serif;fill:#111827}
    .body{font:500 12px Inter,"Segoe UI","Yu Gothic UI",Meiryo,Arial,sans-serif;fill:#111827}
    .small{font:500 11px Inter,"Segoe UI","Yu Gothic UI",Meiryo,Arial,sans-serif;fill:#526174}
    .tiny{font:700 10px Inter,"Segoe UI","Yu Gothic UI",Meiryo,Arial,sans-serif;fill:#526174}
    .mono{font:500 11px Consolas,Menlo,monospace;fill:#111827}
    .nav{font:650 13px Inter,"Segoe UI",Arial,sans-serif;fill:#526174}
    .nav-on{font:750 13px Inter,"Segoe UI",Arial,sans-serif;fill:#4f46e5}
  </style>

    <g id="sidebar">
      <rect x="0" y="0" width="204" height="1024" rx="0" fill="#ffffff" stroke="#d8e0ea" stroke-width="1"/>
      <text x="28" y="43" class="title">Nagare</text>
      <text x="30" y="64" class="kicker">制御プレーン</text>
      <text x="30" y="82" class="small">プロジェクト対応ランタイム</text>
      <g>
        <rect x="18" y="96" width="168" height="33" rx="7" fill="#eef2ff" stroke="#eef2ff" stroke-width="1"/>
        <text x="34" y="118" class="nav-on">ワーク</text>
      </g><g>

        <text x="34" y="157" class="nav">プロジェクト</text>
      </g><g>

        <text x="34" y="196" class="nav">ドメイン</text>
      </g><g>

        <text x="34" y="235" class="nav">エージェント</text>
      </g><g>

        <text x="34" y="274" class="nav">スキル</text>
      </g><g>

        <text x="34" y="313" class="nav">MCP</text>
      </g><g>

        <text x="34" y="352" class="nav">設定</text>
      </g>
    </g>
    <g id="page-header">
      <text x="232" y="48" class="title">トレース詳細</text>
      <text x="232" y="72" class="small">どのエージェントが、なぜ選ばれ、どのセッション / ツールで何をしたかを説明する</text>
      <rect x="1258" y="28" width="116" height="34" rx="7" fill="#4f46e5" stroke="#4f46e5" stroke-width="1"/>
  <text x="1272" y="50" class="body" style="fill:#ffffff">結果を採用</text><rect x="1132" y="28" width="102" height="34" rx="7" fill="#ffffff" stroke="#b8c4d3" stroke-width="1"/>
  <text x="1146" y="50" class="body" style="fill:#111827">差し戻し</text>
    </g>
    <g id="content">

    <rect x="232" y="96" width="1164" height="828" rx="8" fill="#ffffff" stroke="#d8e0ea" stroke-width="1"/>
    <rect x="252" y="124" width="376" height="720" rx="8" fill="#fbfcfe" stroke="#d8e0ea" stroke-width="1"/>
    <text x="276" y="162" class="h2">ステップ履歴</text>
    <text x="276" y="188" class="small">依頼から結果までを一対一で追う</text>
    <line x1="300" y1="246" x2="300" y2="702" stroke="#b8c4d3" stroke-width="2"/>
    <g>
      <circle cx="300" cy="252" r="17" fill="#dcfce7" stroke="#15803d" stroke-width="2"/>
      <text x="295" y="257" class="tiny" style="fill:#15803d">1</text>
      <rect x="328" y="225" width="244" height="58" rx="8" fill="#ffffff" stroke="#d8e0ea" stroke-width="1"/>
      <text x="344" y="248" class="h3">プロジェクト解決</text>
      <text x="344" y="270" class="small">Nagare / ルート確認</text>
    </g>
    <g>
      <circle cx="300" cy="338" r="17" fill="#dcfce7" stroke="#15803d" stroke-width="2"/>
      <text x="295" y="343" class="tiny" style="fill:#15803d">2</text>
      <rect x="328" y="311" width="244" height="58" rx="8" fill="#ffffff" stroke="#d8e0ea" stroke-width="1"/>
      <text x="344" y="334" class="h3">ドメイン推定</text>
      <text x="344" y="356" class="small">UX + ツール方針</text>
    </g>
    <g>
      <circle cx="300" cy="424" r="17" fill="#dcfce7" stroke="#15803d" stroke-width="2"/>
      <text x="295" y="429" class="tiny" style="fill:#15803d">3</text>
      <rect x="328" y="397" width="244" height="58" rx="8" fill="#ffffff" stroke="#d8e0ea" stroke-width="1"/>
      <text x="344" y="420" class="h3">割り当て選択</text>
      <text x="344" y="442" class="small">designer-agent / Codex</text>
    </g>
    <g>
      <circle cx="300" cy="510" r="17" fill="#dcfce7" stroke="#15803d" stroke-width="2"/>
      <text x="295" y="515" class="tiny" style="fill:#15803d">4</text>
      <rect x="328" y="483" width="244" height="58" rx="8" fill="#ffffff" stroke="#d8e0ea" stroke-width="1"/>
      <text x="344" y="506" class="h3">機能解決</text>
      <text x="344" y="528" class="small">hachi-search実行可</text>
    </g>
    <g>
      <circle cx="300" cy="596" r="17" fill="#fef3c7" stroke="#b45309" stroke-width="2"/>
      <text x="295" y="601" class="tiny" style="fill:#b45309">5</text>
      <rect x="328" y="569" width="244" height="58" rx="8" fill="#ffffff" stroke="#d8e0ea" stroke-width="1"/>
      <text x="344" y="592" class="h3">承認要求</text>
      <text x="344" y="614" class="small">ファイル書き込み確認</text>
    </g>
    <g>
      <circle cx="300" cy="682" r="17" fill="#fef3c7" stroke="#b45309" stroke-width="2"/>
      <text x="295" y="687" class="tiny" style="fill:#b45309">6</text>
      <rect x="328" y="655" width="244" height="58" rx="8" fill="#ffffff" stroke="#d8e0ea" stroke-width="1"/>
      <text x="344" y="678" class="h3">結果レビュー</text>
      <text x="344" y="700" class="small">ルーブリック 6/7</text>
    </g>

    <rect x="660" y="124" width="354" height="720" rx="8" fill="#fbfcfe" stroke="#d8e0ea" stroke-width="1"/>
    <text x="684" y="162" class="h2">選定理由</text>
    <text x="684" y="188" class="small">選定理由をログではなく判断単位で表示</text>
    <rect x="684" y="236" width="158" height="24" rx="12" fill="#dcfce7" stroke="#dcfce7" stroke-width="1"/>
  <text x="694" y="252" class="tiny" style="fill:#15803d">ドメイン一致 0.91</text>
    <text x="684" y="270" class="body">UXルーブリックを担当可能</text>
    <rect x="684" y="318" width="150" height="24" rx="12" fill="#dcfce7" stroke="#dcfce7" stroke-width="1"/>
  <text x="694" y="334" class="tiny" style="fill:#15803d">プロジェクト適合</text>
    <text x="684" y="352" class="body">Nagare UI 指針を保持</text>
    <rect x="684" y="400" width="146" height="24" rx="12" fill="#dbeafe" stroke="#dbeafe" stroke-width="1"/>
  <text x="694" y="416" class="tiny" style="fill:#2563eb">ランタイム再利用</text>
    <text x="684" y="434" class="body">Codexスレッド継続可</text>
    <rect x="684" y="482" width="142" height="24" rx="12" fill="#ccfbf1" stroke="#ccfbf1" stroke-width="1"/>
  <text x="694" y="498" class="tiny" style="fill:#0f766e">利用可能な道具</text>
    <text x="684" y="516" class="body">hachi-search / github-mcp</text>
    <line x1="684" y1="580" x2="990" y2="580" stroke="#d8e0ea" stroke-width="1"/>
    <text x="684" y="622" class="h2">評価結果</text>
    <rect x="684" y="652" width="96" height="24" rx="12" fill="#dcfce7" stroke="#dcfce7" stroke-width="1"/>
  <text x="694" y="668" class="tiny" style="fill:#15803d">6件通過</text>
    <rect x="792" y="652" width="124" height="24" rx="12" fill="#fef3c7" stroke="#fef3c7" stroke-width="1"/>
  <text x="802" y="668" class="tiny" style="fill:#b45309">1件レビュー</text>
    <text x="684" y="704" class="small">未確認: モバイル幅でセッション表が読めるか</text>

    <rect x="1048" y="124" width="328" height="720" rx="8" fill="#fbfcfe" stroke="#d8e0ea" stroke-width="1"/>
    <text x="1072" y="162" class="h2">判断</text>
    <text x="1072" y="188" class="small">依頼者が今判断すること</text>
    <rect x="1072" y="226" width="280" height="128" rx="8" fill="#fef3c7" stroke="#b45309" stroke-width="1"/>
    <text x="1094" y="264" class="h2" style="fill:#b45309">結論</text>
    <text x="1094" y="294" class="body">解決は説明可能。</text>
    <text x="1094" y="320" class="body">ファイル書き込みだけ承認待ち。</text>
    <text x="1072" y="406" class="h2">根拠</text>
    <rect x="1072" y="436" width="136" height="24" rx="12" fill="#dbeafe" stroke="#dbeafe" stroke-width="1"/>
  <text x="1082" y="452" class="tiny" style="fill:#2563eb">UIモック変更</text>
    <rect x="1072" y="470" width="140" height="24" rx="12" fill="#dcfce7" stroke="#dcfce7" stroke-width="1"/>
  <text x="1082" y="486" class="tiny" style="fill:#15803d">道具呼び出しOK</text>
    <rect x="1072" y="504" width="116" height="24" rx="12" fill="#fef3c7" stroke="#fef3c7" stroke-width="1"/>
  <text x="1082" y="520" class="tiny" style="fill:#b45309">レビュー 6/7</text>
    <rect x="1072" y="612" width="134" height="34" rx="7" fill="#4f46e5" stroke="#4f46e5" stroke-width="1"/>
  <text x="1086" y="634" class="body" style="fill:#ffffff">承認して続行</text>
    <rect x="1222" y="612" width="100" height="34" rx="7" fill="#ffffff" stroke="#b8c4d3" stroke-width="1"/>
  <text x="1236" y="634" class="body" style="fill:#111827">詳細ログ</text>

    </g>

</svg>