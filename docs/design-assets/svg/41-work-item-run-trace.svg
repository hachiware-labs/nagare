      <rect x="812" y="1774" width="410" height="108" rx="6" fill="#f1f5f9" stroke="#d8e0ea" stroke-width="1"/>
      <text x="824" y="1795" class="body">構想整合性はOK</text><text x="824" y="1813" class="small">RuntimeよりProject/Workを中心に説明できている</text><text x="824" y="1831" class="small">初回導線の記述は概ね自然</text><text x="824" y="1849" class="small">スキル管理の説明は追加余地あり</text><text x="824" y="1867" class="small">表現修正1件を指摘し、確認を継続中</text>
    </g>
      <g>
