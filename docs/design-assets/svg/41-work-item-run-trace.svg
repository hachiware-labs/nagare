      <rect x="338" y="1906" width="450" height="108" rx="6" fill="#f1f5f9" stroke="#d8e0ea" stroke-width="1"/>
      <text x="350" y="1927" class="body">README品質 / 構想整合性: 82 / 100</text><text x="350" y="1945" class="small">構想整合性 28/30</text><text x="350" y="1963" class="small">分かりやすさ 24/30</text><text x="350" y="1981" class="small">具体性 18/25</text><text x="350" y="1999" class="small">残件 12/15</text>
    </g>
      <g>
      <text x="812" y="1896" class="tiny" style="fill:#526174">指摘</text>
      <rect x="812" y="1906" width="410" height="108" rx="6" fill="#f1f5f9" stroke="#d8e0ea" stroke-width="1"/>
      <text x="824" y="1927" class="body">用語の揺れと導線説明の不足を指摘</text><text x="824" y="1945" class="small">追加修正が必要なら作成ステップへ戻す</text><text x="824" y="1963" class="small">レビュー結果は詳細画面に残す</text><text x="824" y="1981" class="small">長いログは初期表示しない</text><text x="824" y="1999" class="small">完了後に回答サマリへ反映予定</text>
