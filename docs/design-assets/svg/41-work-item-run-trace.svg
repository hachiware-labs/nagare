      <text x="1074" y="1770" class="small" style="fill:#2563eb">現在処理中</text>
      <g>
      <text x="338" y="1764" class="tiny" style="fill:#526174">レビュー対象</text>
      <rect x="338" y="1774" width="450" height="108" rx="6" fill="#f1f5f9" stroke="#d8e0ea" stroke-width="1"/>
      <text x="350" y="1795" class="body">README差分案</text><text x="350" y="1813" class="small">作成エージェントが出した説明文と変更案</text><text x="350" y="1831" class="small">新構想の資料と照合</text><text x="350" y="1849" class="small">ユーザーが優先したUI導線とも照合</text><text x="350" y="1867" class="small">未確定の用語がないか確認</text>
    </g>
      <g>
